<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Virtual - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="pantalla-login">
        <div class="top-bar">
            <button class="btn-salir">salir</button>
        </div>

        <div class="logo-wrapper">
            <img src="assets/largo.png" alt="Logo Clínica Virtual" class="logo-principal">
        </div>

        <form id="loginForm" class="form-login">
            <div class="input-group">
                <label for="usuario">usuario:</label>
                <input type="text" id="usuario" name="usuario" placeholder="usuario" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="contrasena">contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="********" required>
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>
            
            <div class="enlace-olvido">
                <a href="pages/24-recuperar-password.html">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
