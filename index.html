<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Virtual - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="pantalla-login">
        <div class="header-login">
            <h2 class="titulo-login">Iniciar Sesión</h2>
        </div>

        <div class="logo-wrapper">
            <img src="assets/logocuad.png" alt="Logo Clínica Virtual" class="logo-principal" style="max-width: 150px; mix-blend-mode: multiply;">
        </div>

        <form id="loginForm" class="form-login">
            <div class="input-group user">
                <input type="text" id="usuario" name="usuario" placeholder="Correo electrónico" required autocomplete="email">
                <label for="usuario">Correo electrónico</label>
            </div>

            <div class="input-group pass">
                <input type="password" id="contrasena" name="contrasena" placeholder="Contraseña" required>
                <label for="contrasena">Contraseña</label>
            </div>

            <button type="submit" class="btn-ingresar">Ingresar</button>
            
            <div class="enlace-olvido">
                <a href="pages/24-recuperar-password.html">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
    </div>

    <div class="footer-login">
        <p>&copy; Daniel Huerta</p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
