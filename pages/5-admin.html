<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Administrador</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 500px; position: relative; z-index: 1;">
        <div style="text-align: right; margin-bottom: 10px;">
            <button class="btn-salir" onclick="window.location.href='../index.html'">salir</button>
        </div>
        
        <div class="logo-wrapper" style="margin-bottom: 20px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo" style="max-width: 150px;">
        </div>
        
        <h2 id="saludo-admin" style="color: #0E3B5C; text-align: center; margin-bottom: 5px;">¡Bienvenido Administrador!</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Panel de Control y Gestión de la Clínica</p>
        
        <div class="menu-grid" style="display: flex; flex-direction: column; gap: 15px;">
            
            <h4 style="color: #991D27; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 5px;">Gestión de Personal</h4>
            
            <button class="card-menu" onclick="window.location.href='12-menu-doctor-admin.html'">
                <div class="icon-box">👨‍⚕️</div>
                <div class="text-box">
                    <h3>Gestionar Doctores</h3>
                    <p>Altas, bajas y modificaciones del cuerpo médico.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='13-menu-enfermer-admin.html'">
                <div class="icon-box">🩺</div>
                <div class="text-box">
                    <h3>Gestionar Enfermería</h3>
                    <p>Altas, bajas y modificaciones del personal de apoyo.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='30-lista-usuarios.html'">
                <div class="icon-box">📋</div>
                <div class="text-box">
                    <h3>Consultar Usuarios y Accesos</h3>
                    <p>Ver la lista completa de usuarios y sus estatus.</p>
                </div>
            </button>

            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 15px;">Operación de la Clínica</h4>

            <button class="card-menu" onclick="window.location.href='10-registrar-paciente.html'">
                <div class="icon-box">📝</div>
                <div class="text-box">
                    <h3>Registrar Nuevo Paciente</h3>
                    <p>Dar de alta a un paciente por primera vez.</p>
                </div>
            </button>

            <button class="card-menu" onclick="window.location.href='29-agenda-admin.html'">
                <div class="icon-box">💬</div>
                <div class="text-box">
                    <h3>Buzón y Agenda Operativa</h3>
                    <p>Gestionar comunicaciones y directorio.</p>
                </div>
            </button>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            const titulo = document.getElementById('saludo-admin');
            if (nombre && nombre !== "undefined") {
                // Cambia "Administrador" por el nombre real de la BD
                titulo.innerText = `¡Bienvenido(a) ${nombre}!`;
            }
        });
    </script>
</body>
</html>
