<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Estudios</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="pantalla-menu">
        <div class="top-bar">
            <button class="btn-salir" onclick="history.back()">regresar</button>
        </div>

        <div class="logo-container-mini">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-mini">
        </div>

        <div class="bienvenida">
            <h1>Consultar estudios</h1>
            <p>Seleccione la opción de estudios:</p>
        </div>

        <div class="menu-grid">
            <button onclick="window.location.href='14-solicitar-estudios.html'">Solicitar estudios</button>
            <button onclick="window.location.href='15-mostrar-estudios.html'">Consultar estudios de un paciente</button>
        </div>
        
        <div style="margin-top: 30px; color: #0E3B5C;">
            <p><strong id="nombre-doctor-estudios">Cargando Doctor...</strong></p>
            <p>Céd. Prof. <span id="cedula-doctor-estudios">S/N</span> | IPN</p>
            <p><span id="reloj-actual" style="font-weight: bold;">--:--</span></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            const cedula = localStorage.getItem('cedulaUsuario');
            if (nombre && nombre !== "undefined") {
                document.getElementById('nombre-doctor-estudios').innerText = `Dr(a). ${nombre}`;
            }
            if (cedula && cedula !== "undefined") {
                document.getElementById('cedula-doctor-estudios').innerText = cedula;
            }
        });
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
