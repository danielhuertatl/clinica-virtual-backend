<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuarios y Accesos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 900px; position: relative; z-index: 1;">
        
        <div class="header-consulta">
            <p><strong>Control de Usuarios y Accesos</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">regresar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-top: 10px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo-mini" style="max-width: 100px;">
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <h2 style="color: #0E3B5C; margin-bottom: 5px;">Directorio de Usuarios</h2>
            <p style="color: #666; font-size: 14px;">Administre las cuentas con acceso al sistema y visualice sus estatus.</p>
        </div>

        <button onclick="cargarUsuariosAdmin()" class="btn-accion" style="width: 100%; margin-top: 20px;">
            🔄 Actualizar Lista
        </button>
        
        <div id="contenedor-usuarios-admin" style="overflow-x: auto;"></div>

    </div>

    <script src="../js/app.js"></script>
</body>
</html>
