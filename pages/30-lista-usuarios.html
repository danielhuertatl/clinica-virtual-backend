<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuarios y Accesos</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Estilos específicos para la gestión visual de estatus */
        #lista-usuarios-admin {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tarjeta-usuario {
            background: white;
            border-left: 6px solid #0E3B5C;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .tarjeta-usuario:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .tarjeta-usuario.inactivo {
            border-left-color: #991D27 !important;
            background-color: #fdf2f3 !important;
            opacity: 0.8;
        }
        .badge-rol {
            background-color: #e6f0fa;
            color: #0E3B5C;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .tarjeta-usuario.inactivo .badge-rol {
            background-color: #fce8e6;
            color: #991D27;
        }
    </style>
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 900px; position: relative; z-index: 1;">
        
        <div class="header-consulta">
            <p><strong>Control de Usuarios y Accesos</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="window.location.href='5-admin.html'">regresar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-top: 10px; text-align: center;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo-mini" style="max-width: 100px;">
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <h2 style="color: #0E3B5C; margin-bottom: 5px;">Directorio de Usuarios</h2>
            <p style="color: #666; font-size: 14px;">Visualice el estado de las credenciales de acceso de la plantilla médica, administrativa y de pacientes.</p>
        </div>

        <div id="lista-usuarios-admin">
            <p style="text-align: center; color: #666; padding: 20px;">Sincronizando cuentas con el servidor remoto...</p>
        </div>

    </div>

    <script src="../js/app.js"></script>
</body>
</html>
