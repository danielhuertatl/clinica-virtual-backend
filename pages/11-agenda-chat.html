<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Agenda - Clínica Virtual</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .card-cita {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid #0E3B5C;
            margin-top: 20px;
        }
        .info-cita {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #ccc;
        }
        .fecha-box {
            background: #0E3B5C;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }
        .fecha-box span { display: block; font-size: 20px; font-weight: bold; }
        
        .btn-soporte {
            background: #f0f4f8;
            color: #0E3B5C;
            border: 1px solid #0E3B5C;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 500px; position: relative; z-index: 1;">
        <div class="header-consulta">
            <p><strong>Mi Agenda</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="window.location.href='3-paciente.html'">regresar</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <h2 style="color: #0E3B5C;">Próxima Cita Programada</h2>
            <p style="color: #666;">Presentarse 15 minutos antes con su identificación.</p>
        </div>

        <div class="card-cita">
            <div class="info-cita">
                <div class="fecha-box">
                    <small>ABRIL</small>
                    <span>25</span>
                    <small>2026</small>
                </div>
                <div>
                    <h3 style="margin: 0; color: #0E3B5C;">Consulta General</h3>
                    <p style="margin: 5px 0; color: #444;"><strong>Hora:</strong> 10:30 AM</p>
                    <p style="margin: 0; color: #666; font-size: 14px;">Dr. Juan Pérez López</p>
                </div>
            </div>
            
            <div style="font-size: 14px; color: #555;">
                <p>📍 <strong>Ubicación:</strong> Consultorio 4 - Planta Alta</p>
                <p>📝 <strong>Nota:</strong> Favor de traer sus estudios previos de laboratorio.</p>
            </div>
        </div>

        <button class="btn-soporte" onclick="mostrarBuzon()">
            💬 ¿Dudas o cambios? Enviar mensaje
        </button>

        <div id="seccion-mensaje" style="display: none; margin-top: 20px; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
            <h4 style="margin-bottom: 10px;">Enviar mensaje a administración</h4>
            <textarea id="texto-queja" placeholder="Escriba su duda sobre la cita aquí..." style="width: 100%; height: 80px; margin-bottom: 10px;"></textarea>
            <button class="btn-ok" style="width: 100%;" onclick="enviarQueja()">Enviar</button>
        </div>

    </div>

    <script>
        function mostrarBuzon() {
            document.getElementById('seccion-mensaje').style.display = 'block';
        }

        function enviarQueja() {
            const t = document.getElementById('texto-queja').value;
            if(t.trim() === "") return;
            alert("✅ Su mensaje ha sido enviado al administrador.");
            document.getElementById('seccion-mensaje').style.display = 'none';
        }
    </script>
</body>
</html>
