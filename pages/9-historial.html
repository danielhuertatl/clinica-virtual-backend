<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico del Paciente</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .tarjeta-estudio {
            background-color: white;
            border-left: 5px solid #0E3B5C;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
        }
        .btn-ver {
            background-color: #0E3B5C;
            color: white;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 800px; position: relative; z-index: 1;">
        <div class="header-consulta">
            <p><strong>Consulta de Expediente Clínico</strong></p>
            <div class="reloj-salir">
                <span id="reloj-actual" style="font-weight: bold; color: #0E3B5C;">--:--</span>
                <button class="btn-salir-rojo" onclick="history.back()">regresar</button>
            </div>
        </div>

        <div class="id-paciente-section" style="margin-top: 15px; background-color: #f0f4f8; padding: 15px; border-radius: 5px; border: 1px solid #0E3B5C;">
            <label style="color: #0E3B5C; font-weight: bold;">Buscar paciente por Teléfono, CURP o Correo:</label>
            <div class="input-inline" style="margin-top: 5px;">
                <input type="text" id="id-busqueda-ver-estudio" placeholder="Ingrese dato del paciente..." style="width: 100%; padding: 8px;">
                <button type="button" class="btn-ok" onclick="buscarEstudiosPaciente()">Buscar</button>
            </div>
        </div>

        <div id="resultados-historial" style="margin-top: 20px;">
            <h3 id="nombre-paciente-ver" style="color: #0E3B5C; text-align: center; margin-bottom: 15px;"></h3>
            <div id="contenedor-consultas"></div>
            <div id="contenedor-estudios"></div>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
