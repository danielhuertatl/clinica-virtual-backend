<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .tarjeta-historial {
            background-color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
        }
        .fecha-historial {
            background-color: #0E3B5C;
            color: white;
            padding: 20px 15px;
            text-align: center;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
        }
        .detalle-historial {
            padding: 15px;
            flex-grow: 1;
        }
        .detalle-historial p {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #333;
        }
        .receta-historial {
            margin-top: 10px;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        .receta-historial pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="marca-agua"></div>
    <div class="pantalla-consulta" style="max-width: 800px; position: relative; z-index: 1;">
        <div class="header-consulta">
            <p><strong>Consulta de Historial Clínico</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">regresar</button>
            </div>
        </div>
        <div class="id-paciente-section" style="margin-top: 20px;">
            <label>Ingrese Teléfono, CURP o Correo del paciente:</label>
            <div class="input-inline">
                <input type="text" id="termino-historial" placeholder="Buscar paciente...">
                <button type="button" id="btn-buscar-historial" class="btn-ok">Buscar</button>
            </div>
        </div>
        <div id="contenedor-historial" style="margin-top: 30px;">
            <p style="text-align: center; color: #666;">Ingrese un Teléfono, CURP o Correo para ver el historial de un paciente.</p>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
