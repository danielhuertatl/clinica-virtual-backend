<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda del Doctor - Panel de Control</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 700px; position: relative; z-index: 1;">
        
        <div class="header-consulta">
            <div class="info-doctor">
                <p><strong>Mi Agenda y Notificaciones</strong></p>
                <p style="font-size: 14px; color: #666;" id="nombre-doctor-agenda">Cargando Doctor...</p>
            </div>
            <div class="reloj-salir">
                <span id="reloj-actual" style="font-weight: bold; color: #0E3B5C;">--:--</span>
                <button class="btn-salir-rojo" onclick="window.location.href='2-doctor.html'">regresar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-bottom: 10px;">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-mini" style="max-width: 100px;">
        </div>

        <h3 style="color: #0E3B5C; border-bottom: 2px solid #0E3B5C; padding-bottom: 5px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
            <span>📅 Citas Programadas</span>
            <input type="date" id="filtro-fecha-agenda" style="font-size: 14px; padding: 4px; border: 1px solid #0E3B5C; border-radius: 4px; color: #0E3B5C; font-family: inherit;">
        </h3>

        <div id="contenedor-citas-hoy-agenda">
            <p style="text-align: center; color: #666; padding: 20px;">Cargando su agenda del día...</p>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 20px;">
            <button class="btn-cargar" style="flex: 1; border-color: #0E3B5C; color: #0E3B5C;" onclick="window.location.href='25-editar-horario.html'">⚙️ Editar mi Horario Disponible</button>
            <button class="btn-cargar" style="flex: 1; border-color: #2D5A27; color: #2D5A27;" onclick="window.location.href='6-consulta-ahora.html'">➕ Atender Paciente sin Cita</button>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            if (nombre && nombre !== "undefined") {
                document.getElementById('nombre-doctor-agenda').innerText = `Dr(a). ${nombre}`;
            }
        });
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
