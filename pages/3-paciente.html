<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Paciente</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 500px; position: relative; z-index: 1;">
        <div style="text-align: right; margin-bottom: 10px;">
            <button class="btn-salir" onclick="window.location.href='../index.html'">salir</button>
        </div>
        
        <div class="logo-wrapper" style="margin-bottom: 20px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo" style="max-width: 150px;">
        </div>
        
        <h2 id="saludo-paciente" style="color: #0E3B5C; text-align: center; margin-bottom: 5px;">¡Bienvenido(a)!</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Portal de servicios para el paciente</p>
        
        <div class="menu-grid" style="display: flex; flex-direction: column; gap: 15px;">
            
            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 5px;">Mis Servicios</h4>
            
            <button class="card-menu" onclick="window.location.href='27-agendar-cita.html'">
                <div class="icon-box">📅</div>
                <div class="text-box">
                    <h3>Agendar Nueva Cita</h3>
                    <p>Elija un doctor y un horario disponible.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='26-mis-citas.html'">
                <div class="icon-box">📋</div>
                <div class="text-box">
                    <h3>Consultar Mis Citas</h3>
                    <p>Vea sus próximas citas y su historial.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='15-mostrar-estudios.html'">
                <div class="icon-box">🔬</div>
                <div class="text-box">
                    <h3>Ver Mis Estudios y Resultados</h3>
                    <p>Consulte sus órdenes y resultados de laboratorio.</p>
                </div>
            </button>

            <button class="card-menu" onclick="window.location.href='15-mostrar-estudios.html'">
                <div class="icon-box">📑</div>
                <div class="text-box">
                    <h3>Ver Mi Historial Clínico</h3>
                    <p>Revise el registro de sus consultas pasadas.</p>
                </div>
            </button>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            const titulo = document.getElementById('saludo-paciente');
            if (nombre && nombre !== "undefined") {
                titulo.innerText = `¡Bienvenido(a) ${nombre}!`;
            }
        });
    </script>
</body>
</html>
