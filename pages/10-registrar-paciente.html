<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Paciente</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 700px; position: relative; z-index: 1;">
        <div class="header-consulta">
            <p><strong>Registro de nuevo paciente</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">salir</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-bottom: 15px;">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-mini" style="max-width: 120px;">
        </div>

        <div class="aviso-legal" style="background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 20px; font-size: 12px; border: 1px solid #f5c6cb; text-align: justify; border-radius: 4px;">
            AtenciГіn: Para pacientes extranjeros, deje el campo CURP vacГӯo.
            <div style="margin-top: 10px; font-size: 16px; font-weight: bold; text-align: center; color: #991D27; border-top: 1px dashed #f5c6cb; padding-top: 10px;">
                вҡ пёҸ LA CONTRASEГ‘A DE ACCESO SERГҒ EL TELГүFONO REGISTRADO вҡ пёҸ
            </div>
        </div>

        <form id="form-registro" class="datos-paciente-grid">
            
            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Datos Personales</h4>
            
            <div class="campo-fila">
                <div>
                    <label>Nombre(s):</label> 
                    <input type="text" id="nombre" placeholder="Ej. Daniel" required oninput="this.value = this.value.replace(/[^a-zA-ZГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГұГ‘\s]/g, '')">
                </div>
                <div>
                    <label>Ap. Paterno:</label> 
                    <input type="text" id="ap-paterno" placeholder="Ej. Huerta" required oninput="this.value = this.value.replace(/[^a-zA-ZГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГұГ‘\s]/g, '')">
                </div>
                <div>
                    <label>Ap. Materno:</label> 
                    <input type="text" id="ap-materno" placeholder="Ej. Tehuacatl" oninput="this.value = this.value.replace(/[^a-zA-ZГЎГ©ГӯГіГәГҒГүГҚГ“ГҡГұГ‘\s]/g, '')">
                </div>
            </div>

            <div class="campo-fila">
                <div>
                    <label>Edad:</label> 
                    <input type="number" id="edad" placeholder="AГұos" min="0" max="120" required>
                </div>
                <div>
                    <label>TelГ©fono:</label> 
                    <input type="text" id="telefono" placeholder="Ej. 5512345678" maxlength="10" required 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div>
                    <label>Sangre:</label> 
                    <select id="tipo-sangre" required style="width: 100%; padding: 5px; border: 1px solid #0E3B5C; height: 33px;">
                        <option value="" disabled selected>O+</option>
                        <option value="O+">O Positivo (O+)</option>
                        <option value="O-">O Negativo (O-)</option>
                        <option value="A+">A Positivo (A+)</option>
                        <option value="A-">A Negativo (A-)</option>
                        <option value="B+">B Positivo (B+)</option>
                        <option value="B-">B Negativo (B-)</option>
                        <option value="AB+">AB Positivo (AB+)</option>
                        <option value="AB-">AB Negativo (AB-)</option>
                        <option value="Desconocido">Lo desconoce</option>
                    </select>
                </div>
            </div>

            <div class="campo-fila">
                <div style="flex: 2; position: relative;">
                    <label>Email:</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required 
                           onblur="const span = document.getElementById('email-error'); if(this.value.length > 0 && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)){ span.style.display='block'; } else { span.style.display='none'; }">
                    <span id="email-error" style="color: #991D27; font-size: 11px; display: none;">Formato de correo invГЎlido</span>
                </div>
                <div style="flex: 1;">
                    <label>CURP (Opcional):</label> 
                    <input type="text" id="curp" placeholder="18 CARACTERES" maxlength="18" 
                           style="text-transform: uppercase; width: 100%;"
                           oninput="let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); this.value = v; const span = document.getElementById('curp-error'); if(v.length > 0 && !/^[A-Z]{4}\d{6}[HM][A-Z]{5}[A-Z0-9]\d$/.test(v)){ span.style.display='block'; } else { span.style.display='none'; }">
                    <span id="curp-error" style="color: #991D27; font-size: 11px; display: none;">Formato de CURP invГЎlido</span>
                </div>
            </div>

            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 10px;">DirecciГіn</h4>
            
            <div class="campo-fila">
                <div style="flex: 2;">
                    <label>Calle y NГәmero:</label>
                    <input type="text" id="calle" placeholder="Ej. Av. Siempre Viva 123" required>
                </div>
                <div style="flex: 1;">
                    <label>Colonia:</label>
                    <input type="text" id="colonia" placeholder="Colonia o Barrio" required>
                </div>
            </div>

            <div class="campo-fila">
                <div>
                    <label>Municipio:</label>
                    <input type="text" id="municipio" required>
                </div>
                <div>
                    <label>C.P.:</label>
                    <input type="text" id="cp" placeholder="5 dГӯgitos" maxlength="5" required 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>
            
            <button type="submit" id="btn-sync" class="btn-enviar-consulta" style="margin-top: 30px; background-color: #0E3B5C;">Guardar Paciente</button>
        </form>
    </div>

    <script>
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-sync');
            const telefono = document.getElementById('telefono').value;
            const curp = document.getElementById('curp').value.trim().toUpperCase();

            // TUS VALIDACIONES ORIGINALES
            if (telefono.length !== 10) {
                alert('вҡ пёҸ Error: El telГ©fono debe tener exactamente 10 dГӯgitos.');
                return;
            }

            if (curp !== "") {
                const regexCURP = /^[A-Z]{4}\d{6}[HM][A-Z]{5}[A-Z0-9]\d$/;
                if (!regexCURP.test(curp)) {
                    alert('вҡ пёҸ Error: La CURP no tiene un formato vГЎlido.');
                    return;
                }
            }

            btn.innerText = "Sincronizando...";

            const datos = {
                nombre: document.getElementById('nombre').value,
                apellido_p: document.getElementById('ap-paterno').value,
                apellido_m: document.getElementById('ap-materno').value,
                edad: document.getElementById('edad').value,
                telefono: telefono,
                tipo_sangre: document.getElementById('tipo-sangre').value,
                correo: document.getElementById('email').value,
                curp: curp || null,
                calle: document.getElementById('calle').value,
                colonia: document.getElementById('colonia').value,
                municipio: document.getElementById('municipio').value,
                cp: document.getElementById('cp').value
            };

            try {
                const res = await fetch('https://clinica-virtual-backend.onrender.com/api/pacientes', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                const resData = await res.json();
                if (resData.success) {
                    alert("вң… " + resData.mensaje);
                    history.back();
                } else {
                    alert("вҡ пёҸ " + resData.mensaje);
                }
            } catch (err) {
                alert("вқҢ Error de servidor");
            } finally {
                btn.innerText = "Guardar Paciente";
            }
        });
    </script>
</body>
</html>
