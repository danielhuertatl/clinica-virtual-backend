<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receta Médica</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .receta-papel {
            background: white;
            border: 1px solid #ccc;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .receta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #0E3B5C;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        /* Magia: Ocultar botones al imprimir el PDF */
        @media print {
            .botones-impresion {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="pantalla-consulta">
        <div class="botones-impresion" style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px;">
            <button class="btn-accion" onclick="window.print()">Imprimir PDF</button>
            <button class="btn-salir-rojo" onclick="window.location.href='2-doctor.html'">Cerrar</button>
        </div>

        <div class="receta-papel">
            <div class="receta-header">
                <div>
                    <h2 style="color: #0E3B5C;">Clínica Virtual</h2>
                    <p><strong id="nombre-doctor-receta">Cargando Doctor...</strong></p>
                    <p style="font-size: 12px; color: #666;">Céd. Prof. <span id="cedula-doctor-receta">S/N</span> | IPN</p>
                </div>
                <img src="../assets/logocuad.png" alt="Logo" style="width: 80px; mix-blend-mode: multiply;">
            </div>

            <div style="margin-bottom: 20px; font-size: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid #eee; padding: 15px; border-radius: 5px; background-color: #fafafa;">
                <div>
                    <p><strong>Paciente:</strong> <span id="nombre-paciente-receta">Esperando paciente...</span></p>
                    <p><strong>Edad:</strong> <span id="edad-paciente-receta">--</span></p>
                    <p><strong>Fecha y Hora:</strong> <span id="fecha-receta"></span></p>
                </div>
                <div>
                    <p><strong>Peso:</strong> <span id="peso-paciente-receta">--</span></p>
                    <p><strong>Talla:</strong> <span id="talla-paciente-receta">--</span></p>
                    <p><strong>IMC:</strong> <span id="imc-paciente-receta">--</span></p>
                </div>
            </div>

            <div style="min-height: 200px; border-left: 2px solid #991D27; padding-left: 15px;">
                <h3 style="color: #0E3B5C; margin-bottom: 10px;">Rx:</h3>
                <p id="contenido-receta" style="margin-bottom: 10px; font-size: 16px; white-space: pre-wrap;"></p>
            </div>

            <div id="contenedor-interpretados-receta" style="display: none; margin-top: 20px; padding: 15px; border-left: 3px solid #0E3B5C; background-color: #f4f8fb;">
                <p style="color: #0E3B5C; font-weight: bold; margin-bottom: 5px;">🔬 Interpretación de Estudios:</p>
                <p id="texto-interpretados-receta" style="white-space: pre-wrap; font-size: 14px; color: #333;"></p>
            </div>

            <div id="contenedor-pendientes-receta" style="display: none; margin-top: 20px; padding: 10px; border: 1px dashed #991D27; background-color: #fff3f4;">
                <p style="color: #991D27; font-weight: bold; margin-bottom: 5px;">⚠️ Estudios de laboratorio/gabinete pendientes de realizar:</p>
                <p id="texto-pendientes-receta" style="white-space: pre-wrap; font-size: 14px; color: #333;"></p>
            </div>

            <div style="margin-top: 40px; text-align: center; border-top: 1px solid #ccc; padding-top: 10px;">
                <p style="font-size: 12px; color: #666;">Firma del Médico</p>
                <div style="width: 200px; height: 50px; border-bottom: 1px solid #000; margin: 0 auto;"></div>
            </div>
        </div>
    </div>
    
    <script src="../js/app.js"></script>
</body>
</html>
