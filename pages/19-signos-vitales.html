<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toma de Signos Vitales</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 600px; position: relative; z-index: 1;">
        
        <div class="header-consulta">
            <p><strong>Registro de Signos Vitales y Somatometría</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">cancelar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-bottom: 10px; text-align: center;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo-mini" style="max-width: 100px;">
        </div>

        <div class="id-paciente-section" style="margin-top: 10px; background-color: #f0f4f8; padding: 15px; border-radius: 5px; border: 1px solid #0E3B5C;">
            <label style="color: #0E3B5C; font-weight: bold;">Buscar paciente (Teléfono, CURP o Correo):</label>
            <div class="input-inline" style="margin-top: 5px;">
                <input type="text" id="id-busqueda-signos" placeholder="Ingrese dato del paciente...">
                <button type="button" class="btn-ok" onclick="buscarPacienteSignos()">Buscar Paciente</button>
            </div>
        </div>

        <form id="form-signos" class="datos-paciente-grid" style="margin-top: 20px;">
            <div class="campo" style="grid-column: span 2;">
                <label>Nombre del Paciente:</label>
                <input type="text" id="nombre-paciente" readonly style="background-color: #eee; font-weight: bold;" placeholder="Cargue un paciente arriba...">
            </div>

            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; grid-column: span 2; margin-top: 10px; text-align: left;">Signos Vitales</h4>

            <div class="campo-fila" style="grid-column: span 2;">
                <div>
                    <label for="peso">Peso (kg):</label>
                    <input type="number" id="peso" step="0.1" min="1" max="300" placeholder="Ej. 70.5" required>
                </div>
                <div>
                    <label for="talla">Talla (m):</label>
                    <input type="number" id="talla" step="0.01" min="0.3" max="2.5" placeholder="Ej. 1.75" required>
                </div>
                <div>
                    <label for="temp">Temperatura (°C):</label>
                    <input type="number" id="temp" step="0.1" min="30" max="45" placeholder="Ej. 36.5" required>
                </div>
            </div>

            <div class="campo-fila" style="grid-column: span 2;">
                <div>
                    <label for="fc">Frec. Cardíaca (ppm):</label>
                    <input type="number" id="fc" min="30" max="200" placeholder="Ej. 80" required>
                </div>
                <div>
                    <label for="fr">Frec. Respiratoria (rpm):</label>
                    <input type="number" id="fr" min="10" max="60" placeholder="Ej. 16" required>
                </div>
                <div>
                    <label for="sato2">Saturación SatO2 (%):</label>
                    <input type="number" id="sato2" min="40" max="100" placeholder="Ej. 98" required>
                </div>
            </div>

            <div style="grid-column: span 2; display: flex; gap: 15px; margin-top: 20px;">
                <button type="button" class="btn-enviar-consulta" style="background-color: #2D5A27; flex: 1;" onclick="enviarPacienteNuevo()">Mandar a tomar Signos Vitales</button>
            </div>
        </form>
    </div>

    <script>
        const formSignos = document.getElementById('form-signos');

        async function guardarSignosEnBD() {
            const idPaciente = document.getElementById('id-busqueda-signos').dataset.idReal;
            if (!idPaciente) {
                alert("⚠️ Error: Debe cargar a un paciente válido antes de registrar los signos.");
                return false;
            }

            const datosSignos = {
                id_paciente: parseInt(idPaciente),
                peso: parseFloat(document.getElementById('peso').value),
                talla: parseFloat(document.getElementById('talla').value),
                fc: parseInt(document.getElementById('fc').value),
                fr: parseInt(document.getElementById('fr').value),
                sato2: parseInt(document.getElementById('sato2').value),
                temp: parseFloat(document.getElementById('temp').value)
            };

            try {
                const res = await fetch('https://clinica-virtual-backend.onrender.com/api/signos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosSignos)
                });
                const data = await res.json();
                return data.success;
            } catch (e) {
                alert("❌ Error de conexión al almacenar signos vitales.");
                return false;
            }
        }

        async function enviarPacienteNuevo() {
            if (formSignos.reportValidity()) {
                const guardado = await guardarSignosEnBD();
                if (guardado) {
                    const nombre = document.getElementById('nombre-paciente').value;
                    try {
                        const res = await fetch('https://clinica-virtual-backend.onrender.com/api/doctores/disponibilidad');
                        const data = await res.json();
                        if (data.success) {
                            const doc = data.doctor;
                            const nombreDoc = `Dr(a). ${doc.nombre} ${doc.apellido_paterno}`.trim();
                            alert(`✅ PACIENTE ENVIADO A CONSULTA.\n\nEl paciente ${nombre} ha sido asignado al ${nombreDoc} por menor volumen de carga operativa actual.`);
                            window.location.href = '4-enfermero.html';
                        } else {
                            alert(`⚠️ AVISO: Signos guardados. No hay médicos disponibles en este momento, el paciente se mantendrá en sala de espera.`);
                            window.location.href = '4-enfermero.html';
                        }
                    } catch(e) {
                        alert("❌ Error de comunicación al calcular balanceo de médicos.");
                    }
                }
            }
        }
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
