<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Virtual - Doctor</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 500px; position: relative; z-index: 1;">
        <div style="text-align: right; margin-bottom: 10px;">
            <button class="btn-salir" onclick="window.location.href='../index.html'">salir</button>
        </div>
        
        <div class="logo-wrapper" style="margin-bottom: 20px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo" style="max-width: 150px;">
        </div>
        
        <h2 id="bienvenida-nombre" style="color: #0E3B5C; text-align: center; margin-bottom: 5px;">¡Bienvenido(a)!</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Panel de Control Médico</p>
        
        <div class="menu-grid" style="display: flex; flex-direction: column; gap: 15px;">
            
            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 5px;">Atención y Seguimiento</h4>
            
            <button class="card-menu" onclick="window.location.href='6-consulta-ahora.html'">
                <div class="icon-box">🩺</div>
                <div class="text-box">
                    <h3>Consulta General</h3>
                    <p>Atender a un paciente en el consultorio.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='7-agenda.html'">
                <div class="icon-box">📅</div>
                <div class="text-box">
                    <h3>Consultar mi Agenda</h3>
                    <p>Ver la lista de pacientes citados para hoy.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='8-consultar-estudios.html'">
                <div class="icon-box">🔬</div>
                <div class="text-box">
                    <h3>Consultar Estudios</h3>
                    <p>Solicitar e interpretar resultados de laboratorio.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='9-historial.html'">
                <div class="icon-box">📑</div>
                <div class="text-box">
                    <h3>Historial Clínico</h3>
                    <p>Buscar y revisar el expediente de un paciente.</p>
                </div>
            </button>
            
            <button class="card-menu" onclick="window.location.href='10-registrar-paciente.html'">
                <div class="icon-box">📝</div>
                <div class="text-box">
                    <h3>Registrar Paciente</h3>
                    <p>Dar de alta a un nuevo paciente en el sistema.</p>
                </div>
            </button>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            if (nombre && nombre !== "undefined") {
                document.getElementById('bienvenida-nombre').innerText = `¡Bienvenido(a) ${nombre}!`;
            }
        });
    </script>
</body>
</html>
