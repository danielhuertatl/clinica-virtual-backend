<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta General Completa</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="position: relative; z-index: 1;">
        <div class="header-consulta">
            <div class="info-doctor">
                <p><strong id="nombre-doctor-consulta">Cargando Doctor...</strong></p>
                <p>Céd. Prof. <span id="cedula-doctor-consulta">S/N</span> | IPN</p>
            </div>
            <div class="reloj-salir">
                <span id="reloj-actual" style="font-weight: bold; color: #0E3B5C;">--:--</span>
                <button class="btn-salir-rojo" onclick="window.location.href='2-doctor.html'">salir</button>
            </div>
        </div>

        <div class="logo-wrapper-mini">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-mini">
        </div>

        <div class="id-paciente-section">
            <label>Ingrese ID o CURP del paciente para comenzar:</label>
            <div class="input-inline">
                <input type="text" placeholder="Ej. 1 o CURP..." id="id-busqueda">
                <button type="button" class="btn-ok" onclick="buscarPacienteConsulta()">OK</button>
            </div>
        </div>

        <div id="alerta-estudios" style="display: none; background-color: #fff3f4; border-left: 5px solid #991D27; padding: 15px; margin-top: 15px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h4 style="color: #991D27; margin-bottom: 5px;">⚠️ Estudios Clínicos Pendientes de Revisión</h4>
            <p style="font-size: 13px; color: #666; margin-bottom: 10px;">El paciente tiene órdenes de estudios pendientes. Llene la interpretación para marcarlos como completados en su historial.</p>
            <div id="lista-estudios-pendientes"></div>
        </div>

        <form class="datos-paciente-grid">
            <div class="campo">
                <label>Nombre:</label>
                <input type="text" id="nombre-paciente" readonly placeholder="Esperando búsqueda...">
            </div>
            <div class="campo-fila">
                <div><label>Edad:</label> <input type="text" id="edad-paciente" readonly placeholder="--"></div>
                <div><label>Peso (kg):</label> <input type="number" step="0.1" id="input-peso" placeholder="0.0"></div>
                <div><label>Talla (m):</label> <input type="number" step="0.01" id="input-talla" placeholder="0.00"></div>
            </div>
            <div class="campo-fila">
                <div><label>FC (ppm):</label> <input type="number" id="input-fc" placeholder="0"></div>
                <div><label>FR (rpm):</label> <input type="number" id="input-fr" placeholder="0"></div>
                <div><label>SatO2 (%):</label> <input type="number" id="input-sato2" placeholder="0"></div>
            </div>
            
            <div class="campo" style="position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Receta:</label>
                    <button type="button" id="btn-expandir" style="background: transparent; border: none; color: #0E3B5C; cursor: pointer; text-decoration: underline; font-size: 12px; font-weight: bold;">Ampliar ⤢</button>
                </div>
                <textarea id="texto-receta" rows="4" placeholder="Escriba las indicaciones médicas..."></textarea>
            </div>

            <div class="campo-fila">
                <div><label>Tipo Sangre:</label> <input type="text" id="sangre-paciente" readonly placeholder="--"></div>
                <div><label>IMC:</label> <input type="text" id="input-imc" placeholder="Calculando..." readonly style="background-color: #f0f0f0; font-weight: bold;"></div>
            </div>
        </form>

        <div class="acciones-consulta">
            <button class="btn-accion" onclick="window.location.href='8-consultar-estudios.html'">Consultar estudios</button>
            <button class="btn-accion-rojo">Finalizar consulta S/R</button>
            <button type="button" class="btn-accion-verde" onclick="guardarYGenerarReceta()">Finalizar consulta</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            const cedula = localStorage.getItem('cedulaUsuario');
            if (nombre && nombre !== "undefined") {
                document.getElementById('nombre-doctor-consulta').innerText = `Dr(a). ${nombre}`;
            }
            if (cedula && cedula !== "undefined") {
                document.getElementById('cedula-doctor-consulta').innerText = cedula;
            }
        });
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
