<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="pantalla-login" style="background-color: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 30px;">
        
        <div class="logo-wrapper" style="margin-bottom: 20px;">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-principal" style="max-width: 150px;">
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: #0E3B5C; margin-bottom: 10px;">Recuperar Acceso</h2>
            <p style="color: #666; font-size: 14px; line-height: 1.5;">
                Ingresa tu usuario o correo electrónico. Enviaremos una solicitud al administrador para restablecer tu contraseña.
            </p>
        </div>

        <form class="form-login">
            <div class="input-group">
                <label for="recovery-input">Usuario o Correo:</label>
                <input type="email" id="recovery-input" placeholder="ejemplo@clinica.com" required>
            </div>

            <button type="button" id="btn-recuperar" class="btn-ingresar" onclick="solicitarRecuperacion()">Enviar Solicitud</button>
            
            <button type="button" class="btn-salir" style="width: 100%; margin-top: 10px; border-color: #ccc; color: #666;" onclick="window.location.href='../index.html'">Cancelar y volver</button>
        </form>
    </div>

    <script>
        async function solicitarRecuperacion() {
            const correo = document.getElementById('recovery-input').value.trim();
            if (!correo) {
                alert('⚠️ Por favor, ingresa tu correo electrónico registrado.');
                return;
            }
            
            const btn = document.getElementById('btn-recuperar');
            btn.innerText = 'Enviando...';
            btn.disabled = true;

            try {
                const res = await fetch('https://clinica-virtual-backend.onrender.com/api/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("✅ " + data.mensaje + "\n\nTe contactaremos a la brevedad.");
                    window.location.href = '../index.html';
                } else {
                    alert("❌ " + data.mensaje);
                    btn.innerText = 'Enviar Solicitud';
                    btn.disabled = false;
                }
            } catch (error) {
                alert("❌ Error de conexión con el servidor.");
                btn.innerText = 'Enviar Solicitud';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
