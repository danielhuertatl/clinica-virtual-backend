<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Personal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 750px; position: relative; z-index: 1;">
        <div class="header-consulta">
            <p><strong>Actualizar Datos del Personal</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">cancelar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-top: 10px; margin-bottom: 10px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo-mini" style="max-width: 80px;">
        </div>

        <div class="id-paciente-section" style="background-color: #f0f4f8; padding: 15px; border-radius: 5px; border: 1px solid #0E3B5C; margin-bottom: 20px;">
            <label style="color: #0E3B5C; font-weight: bold;">Buscar por Cédula Profesional o Correo:</label>
            <div class="input-inline" style="margin-top: 5px;">
                <input type="text" id="buscar-cedula" placeholder="Cédula o correo electrónico..." style="width: 100%; padding: 8px;">
                <button type="button" class="btn-ok" onclick="buscarPersonalParaEditarActualizado()">Buscar</button>
            </div>
        </div>

        <form id="form-editar-personal" class="datos-paciente-grid">
            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Edición de Identidad</h4>
            <div class="campo-fila">
                <div>
                    <label>Nombre(s):</label> 
                    <input type="text" id="nombre" required placeholder="Nombre" oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    <span id="nombre-warn" style="color: #d35400; font-size: 11px; display: none; font-weight: bold; margin-top: 3px;"></span>
                </div>
                <div>
                    <label>Apellido Paterno:</label> 
                    <input type="text" id="apellido_p" required placeholder="Apellido" oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    <span id="apellido_p-warn" style="color: #d35400; font-size: 11px; display: none; font-weight: bold; margin-top: 3px;"></span>
                </div>
                <div>
                    <label>Apellido Materno:</label> 
                    <input type="text" id="apellido_m" required placeholder="Apellido" oninput="this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '')">
                    <span id="apellido_m-warn" style="color: #d35400; font-size: 11px; display: none; font-weight: bold; margin-top: 3px;"></span>
                </div>
            </div>

            <div class="campo-fila">
                <div>
                    <label>Teléfono (10 dígitos):</label> 
                    <input type="text" id="telefono" maxlength="10" required placeholder="10 dígitos" 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div style="position: relative;">
                    <label>Email Institucional:</label> 
                    <input type="email" id="email" required placeholder="correo@clinica.com">
                    <span id="email-error" style="color: #991D27; font-size: 11px; display: none; position: absolute; bottom: -15px; left: 0; font-weight: bold;">Formato de correo inválido</span>
                </div>
            </div>

            <h4 style="color: #0E3B5C; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 15px;">Actualizar Dirección</h4>
            <div class="campo-fila">
                <div style="flex: 2;">
                    <label>Calle:</label> 
                    <input type="text" id="calle" required placeholder="Calle" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9\s#.-]/g, '')">
                </div>
                <div style="flex: 1;">
                    <label>Núm Ext:</label> 
                    <input type="text" id="num_ext" required placeholder="Núm" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9\s-]/g, '')">
                </div>
                <div style="flex: 1;">
                    <label>CP:</label> 
                    <input type="text" id="cp" maxlength="5" required placeholder="5 dígitos" 
                           onkeypress="return event.charCode >= 48 && event.charCode <= 57"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>
            <div class="campo">
                <label>Colonia / Municipio:</label>
                <input type="text" id="colonia" required placeholder="Colonia, Municipio">
            </div>

            <div class="campo-fila" style="margin-top: 15px; opacity: 0.7;">
                <div>
                    <label>Puesto (No editable):</label>
                    <input type="text" id="display-puesto" readonly style="background-color: #eee;">
                </div>
                <div>
                    <label>Cédula ID (No editable):</label>
                    <input type="text" id="display-cedula" readonly style="background-color: #eee;">
                </div>
            </div>
            
            <button type="submit" class="btn-enviar-consulta" style="margin-top: 25px; background-color: #2D5A27;">
                Guardar Cambios Actualizados
            </button>
        </form>
    </div>

    <script>
        // Función local avanzada para interceptar el estatus de baja reportado en el PDF
        async function buscarPersonalParaEditarActualizado() {
            const termino = document.getElementById('buscar-cedula').value.trim();
            if (!termino) return alert("Por favor, ingrese una cédula o correo para buscar.");

            try {
                const res = await fetch(`https://clinica-virtual-backend.onrender.com/api/personal/${encodeURIComponent(termino)}`);
                const data = await res.json();

                if (data.success) {
                    const p = data.persona;
                    
                    // Bloqueo preventivo de auditoría: si el usuario está dado de baja, no permitir su edición
                    if (p.id_usuario) {
                        // Consultamos la lista completa para verificar su estatus real activo/inactivo
                        const resUsuarios = await fetch('https://clinica-virtual-backend.onrender.com/api/admin/usuarios');
                        const dataUsr = await resUsuarios.json();
                        if (dataUsr.success) {
                            const usrReal = dataUsr.usuarios.find(u => u.id_usuario === p.id_usuario);
                            if (usrReal && !usrReal.estatus) {
                                alert("⚠️ Error de seguridad: Este personal ha sido DADO DE BAJA previamente del sistema. No se pueden modificar registros inactivos.");
                                document.getElementById('form-editar-personal').reset();
                                return;
                            }
                        }
                    }
                    
                    // Si pasa las validaciones, llamamos a la carga del app.js
                    if (typeof buscarPersonalParaEditar === "function") {
                        buscarPersonalParaEditar();
                    }
                } else {
                    alert("⚠️ " + data.mensaje);
                }
            } catch(e) {
                alert("❌ Error de conexión al verificar el estatus del personal.");
            }
        }

        // Validación en submit para evitar apellidos repetidos en la edición
        document.getElementById('form-editar-personal').addEventListener('submit', function(e) {
            const apP = document.getElementById('apellido_p').value.trim();
            const apM = document.getElementById('apellido_m').value.trim();
            const numExt = document.getElementById('num_ext').value;

            if (apP.split(' ').filter(p => p.length > 1).length > 1 || apM.split(' ').filter(p => p.length > 1).length > 1) {
                e.preventDefault();
                e.stopImmediatePropagation();
                alert('⚠️ Error: Los campos de apellido no deben contener el mismo apellido dos veces.');
            }

            if (numExt.length > 0 && !/\d/.test(numExt)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                alert('⚠️ Error: El "Número Exterior" debe contener al menos un dígito.');
            }
        });
    </script>
    <script src="../js/app.js"></script>
</body>
</html>
