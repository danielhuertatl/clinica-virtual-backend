<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Citas - Paciente</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .tarjeta-cita-destacada {
            background-color: white;
            border: 2px solid #0E3B5C;
            border-left: 8px solid #0E3B5C;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .form-reagendar {
            display: none; 
            background-color: #f0f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border: 1px dashed #0E3B5C;
        }
        .estado-vacio {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background-color: white;
            border-radius: 8px;
            border: 2px dashed #ccc;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="marca-agua"></div>

    <div class="pantalla-consulta" style="max-width: 600px; position: relative; z-index: 1;">
        
        <div class="header-consulta">
            <p><strong>Gestión de mis citas</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="window.location.href='3-paciente.html'">regresar</button>
            </div>
        </div>

        <div class="logo-wrapper-mini" style="margin-bottom: 20px;">
            <img src="../assets/logocuad.png" alt="Logo" class="logo-mini" style="max-width: 100px;">
        </div>

        <button class="btn-accion-verde" style="width: 100%; margin-bottom: 25px; padding: 12px; font-size: 16px;" onclick="window.location.href='27-agendar-cita.html'">➕ Agendar Nueva Cita</button>

        <h3 style="color: #0E3B5C; border-bottom: 2px solid #0E3B5C; padding-bottom: 5px; margin-bottom: 15px;">
            Tu próxima cita
        </h3>

        <div id="mensaje-sin-citas" class="estado-vacio">
            <h3 style="color: #0E3B5C; margin-bottom: 10px;">No tienes citas próximas</h3>
            <p style="font-size: 14px; margin-bottom: 20px;">¿Necesitas atención médica? Agenda una nueva cita con nuestros especialistas.</p>
        </div>

        <div id="contenedor-proxima-cita"></div>

        <h3 style="color: #666; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 30px; margin-bottom: 15px;">
            Historial de Citas Pasadas
        </h3>
        
        <div id="contenedor-historial-citas"></div>

    </div>

    <script src="../js/app.js"></script>
</body>
</html>
