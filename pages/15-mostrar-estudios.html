<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados e Historial</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Estilos específicos para la lista de estudios */
        .lista-estudios {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .tarjeta-estudio {
            background-color: white;
            border: 1px solid #0E3B5C;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-estudio p {
            margin: 2px 0;
            font-size: 14px;
        }
        .btn-ver {
            background-color: #0E3B5C;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-ver:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="pantalla-consulta">
        <div class="header-consulta">
            <p><strong>Expediente y Estudios</strong></p>
            <div class="reloj-salir">
                <button class="btn-salir-rojo" onclick="history.back()">regresar</button>
            </div>
        </div>

        <div class="logo-container-consulta">
            <img src="../assets/cuadrado.png" alt="Logo" class="logo-consulta">
        </div>

        <div class="id-paciente-section" style="margin-top: 10px; background-color: #f0f4f8; padding: 15px; border-radius: 5px; border: 1px solid #0E3B5C;">
            <label style="color: #0E3B5C; font-weight: bold;">Ingrese ID del Paciente para ver su historial:</label>
            <div class="input-inline" style="margin-top: 5px;">
                <input type="text" id="id-busqueda-ver-estudio" placeholder="Ej. 1..." style="width: 100%; padding: 8px;">
                <button type="button" class="btn-ok" onclick="buscarEstudiosPaciente()">Buscar</button>
            </div>
        </div>

        <div class="datos-agenda" style="margin-top: 20px; background: #fff; padding: 10px; border: 1px dashed #0E3B5C;">
            <div class="campo"><label>Paciente:</label> <p id="nombre-paciente-ver">Esperando búsqueda...</p></div>
        </div>

        <div class="lista-estudios">
            
            <h3 style="color: #0E3B5C; border-bottom: 2px solid #991D27; padding-bottom: 5px; margin-bottom: 10px; margin-top: 20px;">Órdenes de Estudios Médicos</h3>
            <div id="contenedor-estudios">
                <p style="color: #666; font-size: 14px; text-align: center; padding: 20px;">Busque un paciente para ver sus estudios médicos.</p>
            </div>

            <h3 style="color: #0E3B5C; border-bottom: 2px solid #0E3B5C; padding-bottom: 5px; margin-bottom: 10px; margin-top: 30px;">Historial de Consultas Previas</h3>
            <div id="contenedor-consultas">
                <p style="color: #666; font-size: 14px; text-align: center; padding: 20px;">Busque un paciente para ver su historial de consultas.</p>
            </div>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pacID = localStorage.getItem('pacienteBuscadoHistorial');
            const rolUsuario = localStorage.getItem('rolUsuario');
            const miIdPaciente = localStorage.getItem('idPaciente');

            if (rolUsuario === 'paciente' && miIdPaciente) {
                // Ocultar sección de búsqueda para el paciente
                const searchSection = document.querySelector('.id-paciente-section');
                if (searchSection) searchSection.style.display = 'none';

                document.getElementById('id-busqueda-ver-estudio').value = miIdPaciente;
                setTimeout(() => {
                    if(typeof buscarEstudiosPaciente === 'function') buscarEstudiosPaciente();
                }, 100);
            } else if(pacID) {
                document.getElementById('id-busqueda-ver-estudio').value = pacID;
                setTimeout(() => {
                    if(typeof buscarEstudiosPaciente === 'function') buscarEstudiosPaciente();
                    localStorage.removeItem('pacienteBuscadoHistorial');
                }, 100);
            }
        });
    </script>
</body>
</html>
